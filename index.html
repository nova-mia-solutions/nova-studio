<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NOVA — AI Studio</title>
<meta name="theme-color" content="#6366f1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0a0f1a;border:1px solid #1e2d42;border-radius:16px;padding:40px;max-width:440px;width:100%;text-align:center}
.logo{font-size:52px;font-weight:900;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;margin-bottom:8px}
h1{font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:8px}
.sub{color:#6b8aad;font-size:13px;margin-bottom:28px;line-height:1.6}
button{width:100%;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}
button:disabled{opacity:.6;cursor:not-allowed}
.status{padding:10px 14px;border-radius:7px;font-size:12px;margin-bottom:14px;text-align:left;line-height:1.5}
.err{background:#ef444412;border:1px solid #ef444430;color:#ef4444}
.ok{background:#10b98112;border:1px solid #10b98130;color:#10b981}
.chat{width:100%;display:flex;flex-direction:column;gap:10px;max-width:700px;margin:0 auto;padding:20px}
.msg-user{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;padding:10px 14px;border-radius:12px;border-bottom-right-radius:2px;align-self:flex-end;max-width:75%;font-size:13px;line-height:1.6}
.msg-ai{background:#0a0f1a;border:1px solid #1e2d42;color:#cbd5e1;padding:10px 14px;border-radius:12px;border-bottom-left-radius:2px;align-self:flex-start;max-width:75%;font-size:13px;line-height:1.6}
.input-row{display:flex;gap:8px;padding:12px 20px;background:#080d14;border-top:1px solid #1e2d42;position:fixed;bottom:0;left:0;right:0}
.input-row input{flex:1;background:#0d1117;border:1px solid #1e2d42;border-radius:8px;color:#e2e8f0;padding:10px 14px;font-size:13px;outline:none}
.input-row button{width:auto;padding:0 18px;margin:0;height:40px}
#chat-view{display:none;flex-direction:column;height:100vh;background:#0d1117}
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-view">
  <div class="card">
    <span class="logo">N</span>
    <h1>NOVA AI Studio</h1>
    <p class="sub">Your autonomous AI project assistant.<br/>Click Launch to get started.</p>
    <div class="status ok" id="status" style="display:none"></div>
    <button id="launch-btn" onclick="launch()">⚡ Launch NOVA</button>
    <p style="font-size:11px;color:#334155">Powered by Claude · nova-studio-nine.vercel.app</p>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat-view">
  <div style="background:#0a0f1a;border-bottom:1px solid #1e2d42;padding:12px 20px;display:flex;align-items:center;gap:10px;position:fixed;top:0;left:0;right:0;z-index:10">
    <span style="font-size:20px;font-weight:900;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">N</span>
    <span style="font-size:14px;font-weight:700;color:#f1f5f9">NOVA AI Studio</span>
    <div style="margin-left:auto;width:8px;height:8px;border-radius:50%;background:#10b981"></div>
  </div>
  <div id="messages" style="margin-top:52px"></div>
  <div class="input-row">
    <input id="msg-input" type="text" placeholder="Ask NOVA anything…" onkeydown="if(event.key==='Enter')sendMsg()"/>
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const history = [];

async function launch() {
  const btn = document.getElementById('launch-btn');
  const st  = document.getElementById('status');
  btn.textContent = '⚙️ Connecting…'; btn.disabled = true;
  st.className = 'status ok'; st.style.display = 'block';
  st.textContent = 'Connecting to NOVA…';

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 50,
        messages: [{ role: 'user', content: 'Say "NOVA online" and nothing else.' }]
      })
    });
    const d = await r.json();
    if (d.content) {
      st.textContent = '✅ Connected!';
      setTimeout(() => showChat(), 800);
    } else {
      st.className = 'status err';
      st.textContent = 'Error: ' + (d.error?.message || JSON.stringify(d));
      btn.textContent = '⚡ Launch NOVA'; btn.disabled = false;
    }
  } catch(e) {
    st.className = 'status err';
    st.textContent = 'Error: ' + e.message;
    btn.textContent = '⚡ Launch NOVA'; btn.disabled = false;
  }
}

function showChat() {
  document.getElementById('login-view').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex'; cv.style.flexDirection = 'column';
  addMsg('ai', 'NOVA online ⚡ I\'m your autonomous AI studio assistant. What are we building today?');
  document.getElementById('msg-input').focus();
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const thinking = addMsg('ai', '⚙️ Thinking…');

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are NOVA, an expert autonomous AI studio assistant. Be direct, smart and proactive. No markdown.',
        messages: history
      })
    });
    const d = await r.json();
    const reply = d.content?.[0]?.text || 'Error: ' + JSON.stringify(d);
    thinking.textContent = reply;
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    thinking.textContent = 'Error: ' + e.message;
  }
}

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = role === 'user' ? 'msg-user' : 'msg-ai';
  el.textContent = text;
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}
</script>
</body>
</html>
